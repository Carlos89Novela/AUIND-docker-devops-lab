services:
  web:
    image: nginx:latest
    container_name: web

    volumes:
      - ./index.html:/usr/share/nginx/html/index.html

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`app.midominio.com`)"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls=true"

    networks:
      - proxy

networks:
  proxy:
    external: true