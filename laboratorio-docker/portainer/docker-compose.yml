services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer

    command: -H unix:///var/run/docker.sock

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

    networks:
      - proxy

volumes:
  portainer_data:

networks:
  proxy:
    external: true
  portainer: